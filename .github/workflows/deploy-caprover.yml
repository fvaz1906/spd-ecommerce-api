name: Build and Deploy API to CapRover

on:
  push:
    branches:
      - main

env:
  APP_NAME: spd-ecommerce-api
  APP_SERVER: https://captain.devops.oovaz.dev.br
  CAPROVER_TOKEN: ${{ secrets.CAPROVER_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Define image tags
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          HASH=$(echo "${{ github.sha }}" | cut -c1-7 | tr '[:upper:]' '[:lower:]')
          TAG="prd-${HASH}"

          echo "IMAGE_URL=ghcr.io/$OWNER/${APP_NAME}:$TAG" >> $GITHUB_ENV
          echo "LATEST_IMAGE_URL=ghcr.io/$OWNER/${APP_NAME}:prd-latest" >> $GITHUB_ENV

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies and build API
        run: |
          npm ci
          npm run build

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_URL }}
            ${{ env.LATEST_IMAGE_URL }}

      - name: Deploy to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ env.APP_SERVER }}
          app: ${{ env.APP_NAME }}
          token: ${{ env.CAPROVER_TOKEN }}
          image: ${{ env.IMAGE_URL }}